name: Secure Portfolio Deployment

on:
  push:
    branches: [ main ]

permissions:
  id-token: write # Required for the OIDC "handshake"
  contents: read  # Required to read your code

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Upload to S3
        run: |
          aws s3 sync . s3://beginner-devops-portfolio-2026 --exclude ".git/*" --exclude ".github/*" --exclude "*.tf*" --exclude ".terraform*"